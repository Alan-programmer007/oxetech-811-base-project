name: CI

# Roda os quality gates sempre que um Pull Request for aberto para a branch main.
on:
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Checagem de tipos
        run: npm run typecheck

      - name: Testes unitarios
        run: npm run test:unit

      - name: Testes de integracao
        run: npm run test:integration
